# nginx site config baked into the frontend image.
#
# Two responsibilities:
#   1. Serve the SPA bundle from /usr/share/nginx/html with HTML5 history-mode
#      fallback (any unknown path => index.html).
#   2. Reverse-proxy /api/ to the backend service. The non-negotiable bit here
#      is `proxy_buffering off` — without it nginx batches the SSE stream and
#      the frontend never sees `delta` frames until the response ends.
#
# Security headers mirror those set by the backend so they are present even
# for the static HTML/JS responses served directly by nginx.

server {
  listen 80;
  server_name _;

  # ---- Security headers --------------------------------------------------
  # HSTS preload-eligible; safe because we never serve cookies/credentials
  # over plain HTTP in production (TLS terminates upstream).
  add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
  add_header X-Frame-Options DENY always;
  add_header X-Content-Type-Options nosniff always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  # Microphone allowed (voice input feature); camera/geolocation/payment denied.
  add_header Permissions-Policy "microphone=(self), camera=(), geolocation=(), payment=()" always;

  # Chat messages are short text; cap the body size aggressively. Voice uploads
  # go through a different size limit at the backend.
  client_max_body_size 256k;

  root /usr/share/nginx/html;
  index index.html;

  # ---- SPA fallback ------------------------------------------------------
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Long-cache the immutable Vite hashed assets.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # ---- API reverse-proxy -------------------------------------------------
  # `backend` resolves via Docker's embedded DNS to the `backend` service.
  location /api/ {
    proxy_pass http://backend:3000;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # Clear the upstream Connection header so nginx can keep-alive to backend.
    proxy_set_header Connection "";

    # ---- SSE: never buffer ----
    # If nginx buffers, the agent's `delta` frames sit in the kernel until the
    # response completes — defeating the whole streaming protocol. Disable
    # both proxy_buffering and the response cache; bump read/send timeouts so
    # long agent runs (multi-step tool use) don't get cut at the default 60s.
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;

    # Allow large request headers (cookies + CSRF + auth tokens).
    proxy_busy_buffers_size 16k;
    proxy_buffers 4 16k;
  }
}
